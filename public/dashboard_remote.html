<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ClinicZone247 - تسجيل الدخول</title>

    <!-- update the version number as needed -->
    <script defer src="/__/firebase/12.12.0/firebase-app-compat.js"></script>
    <!-- include only the Firebase features as you need -->
    <script defer src="/__/firebase/12.12.0/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-database-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-functions-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-messaging-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-storage-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-analytics-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-remote-config-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-performance-compat.js"></script>
    <!-- 
      initialize the SDK after all desired features are loaded, set useEmulator to false
      to avoid connecting the SDK to running emulators.
    -->
    <script defer src="/__/firebase/init.js?useEmulator=true"></script>

    <style media="screen">
      body { background: #f0f2f5; color: #1c1e21; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; direction: rtl; }
      .login-container { background: white; width: 100%; max-width: 400px; padding: 40px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1); text-align: center; }
      .login-container h1 { color: #1877f2; font-size: 28px; margin-bottom: 20px; }
      .login-container input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dddfe2; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
      .login-container button { width: 100%; padding: 12px; background-color: #1877f2; border: none; border-radius: 6px; color: white; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 10px; }
      .login-container button:hover { background-color: #166fe5; }
      .error-message { color: #e74c3c; font-size: 14px; margin-top: 10px; display: none; }
      #load { color: rgba(0,0,0,0.4); text-align: center; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h1>ClinicZone 247</h1>
      <form id="login-form">
        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        <button type="submit">تسجيل الدخول</button>
      </form>
      <p id="error-msg" class="error-message"></p>
      <p id="load">جاري تحميل Firebase...</p>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const loadEl = document.querySelector('#load');
        const loginForm = document.querySelector('#login-form');
        const errorMsg = document.querySelector('#error-msg');

        loginForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const email = document.querySelector('#email').value;
          const password = document.querySelector('#password').value;

          firebase.auth().signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
              // التوجه لصفحة لوحة التحكم عند نجاح الدخول
              window.location.href = 'dashboard.html';
            })
            .catch((error) => {
              errorMsg.style.display = 'block';
              errorMsg.textContent = "خطأ: " + error.message;
            });
        });

        try {
          let app = firebase.app();
          let features = [
            'auth', 
            'database', 
            'firestore',
            'functions',
            'messaging', 
            'storage', 
            'analytics', 
            'remoteConfig',
            'performance',
          ].filter(feature => typeof app[feature] === 'function');
          loadEl.textContent = `Firebase SDK loaded with ${features.join(', ')}`;
        } catch (e) {
          console.error(e);
          loadEl.textContent = 'Error loading the Firebase SDK, check the console.';
        }
      });
    </script>
  </body>
</html>
