<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClinicZone247 - تسجيل الدخول</title>

  <!-- update the version number as needed -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Firebase SDKs - استخدام CDN لضمان التحميل المحلي وعبر الاستضافة -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    // إعدادات مشروع Firebase الخاص بك
    const firebaseConfig = {
      apiKey: "AIzaSyCp9bG1ruz82-pXq_yW0JE9OxqNSqY53qA",
      authDomain: "clinic-305a4.firebaseapp.com",
      databaseURL: "https://clinic-305a4-default-rtdb.firebaseio.com",
      projectId: "clinic-305a4",
      storageBucket: "clinic-305a4.firebasestorage.app",
      messagingSenderId: "388518041668",
      appId: "1:388518041668:web:6d616e03eaa679611c8411",
      measurementId: "G-YKVXJJ3VFS"
    };

    // بدء تشغيل Firebase يدوياً
    firebase.initializeApp(firebaseConfig);
  </script>

  <style media="screen">
    :root {
      --primary-color: #1e40af;
      --primary-hover: #1e3a8a;
      --secondary-color: #0d9488;
      --accent-color: #ca8a04;
      --danger-color: #ef4444;
      --warning-color: #f59e0b;
      --bg-glass: rgba(255, 255, 255, 0.75);
      --border-glass: rgba(255, 255, 255, 0.4);
      --text-main: #062d30;
      --text-secondary: #0d5c63;
      --border-color: #c9e4e6;
      --shadow-premium: 0 30px 60px -12px rgba(13, 92, 99, 0.15);
      --radius-md: 16px;
      --radius-lg: 28px;
      --transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      direction: rtl;
      overflow: hidden;
      background: #f8fcfc;
    }

    /* Mesh Gradient Background Animation */
    .mesh-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(circle at 10% 20%, rgba(13, 92, 99, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(13, 92, 99, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(13, 92, 99, 0.02) 0%, transparent 80%);
      background-color: #f8fafc;
      overflow: hidden;
    }

    .mesh-bg::before,
    .mesh-bg::after {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: var(--primary-color);
      filter: blur(100px);
      opacity: 0.05;
      animation: meshFloat 20s infinite alternate ease-in-out;
    }

    .mesh-bg::before {
      top: -200px;
      left: -200px;
    }

    .mesh-bg::after {
      bottom: -200px;
      right: -200px;
      animation-delay: -10s;
    }

    @keyframes meshFloat {
      0% { transform: translate(0, 0) rotate(0deg) scale(1); }
      50% { transform: translate(50px, 30px) rotate(5deg) scale(1.1); }
      100% { transform: translate(-20px, -40px) rotate(-5deg) scale(0.9); }
    }

    .login-container {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      width: 100%;
      max-width: 440px;
      padding: 50px 40px;
      border-radius: 30px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.5);
      position: relative;
      z-index: 1;
      animation: containerAppear 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes containerAppear {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-container::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: var(--radius-lg);
      padding: 1px;
      background: linear-gradient(135deg, var(--border-glass), transparent 50%, var(--border-glass));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .login-container:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 40px 80px -15px rgba(13, 92, 99, 0.25);
    }

    .logo-placeholder {
      text-align: center;
      margin-bottom: 25px;
      position: relative;
    }

    .logo-placeholder img {
      width: 90px;
      height: auto;
      filter: drop-shadow(0 10px 15px rgba(13, 92, 99, 0.15));
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .logo-placeholder img:hover {
      transform: scale(1.1) rotate(3deg);
    }

    .login-container h1 {
      font-size: 22px;
      margin-bottom: 25px;
      color: var(--text-secondary);
      font-weight: 800;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 700;
      font-size: 15px;
      color: var(--text-secondary);
      padding-right: 5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--primary-color);
      opacity: 0.7;
      font-size: 16px;
      transition: var(--transition);
      z-index: 2;
    }

    .login-container input {
      width: 100%;
      padding: 12px 40px 12px 15px;
      border: 2px solid rgba(201, 228, 230, 0.5);
      border-radius: var(--radius-md);
      box-sizing: border-box;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.6);
      transition: var(--transition);
      font-family: 'Cairo', sans-serif;
      color: var(--text-main);
    }

    .login-container input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(13, 92, 99, 0.08);
      background: white;
    }

    .login-container input:focus+i {
      opacity: 1;
      transform: translateY(-50%) scale(1.1);
    }

    .login-container button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #2b4fa3, #1abc9c);
      border: none;
      border-radius: var(--radius-md);
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
      transition: var(--transition);
      box-shadow: 0 10px 20px -5px rgba(13, 92, 99, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .login-container button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: 0.5s;
    }

    .login-container button:hover::before {
      left: 100%;
    }

    .login-container button:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 30px -5px rgba(13, 92, 99, 0.4);
      filter: brightness(1.1);
    }

    .login-container button:active {
      transform: translateY(-1px);
    }

    .error-message,
    .success-message {
      font-size: 14px;
      margin-top: 20px;
      display: none;
      padding: 14px;
      border-radius: var(--radius-md);
      text-align: center;
      font-weight: 700;
      animation: shake 0.5s ease;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-5px);
      }

      75% {
        transform: translateX(5px);
      }
    }

    .error-message {
      color: var(--danger-color);
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .success-message {
      color: #059669;
      background: rgba(5, 150, 105, 0.1);
      border: 1px solid rgba(5, 150, 105, 0.2);
    }

    #load {
      color: var(--text-secondary);
      text-align: center;
      font-size: 13px;
      margin-top: 30px;
      opacity: 0.6;
      font-weight: 600;
    }

    /* Toast Notifications */
    .toast-container {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }

    .toast {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-md);
      padding: 14px 24px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      border-right: 5px solid var(--primary-color);
      font-weight: 700;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: auto;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      border-right-color: var(--secondary-color);
    }

    .toast.error {
      border-right-color: var(--danger-color);
    }

    /* Loading Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, .3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Welcome Overlay */
    .welcome-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .welcome-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .welcome-text {
      font-size: 80px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      transform: scale(0.7);
      transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .welcome-overlay.active .welcome-text {
      transform: scale(1.1);
    }

    .progress-container {
      width: 350px;
      height: 6px;
      background: #f1f5f9;
      border-radius: 10px;
      margin-top: 35px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.03);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      border-radius: 10px;
    }

    .welcome-overlay.active .progress-fill {
      animation: progressRun 5s linear forwards;
    }

    @keyframes progressRun {
      from { width: 0%; }
      to { width: 100%; }
    }
  </style>
</head>

<body>
  <div id="welcome-overlay" class="welcome-overlay">
    <div class="welcome-text">أهلاً وسهلاً</div>
    <div style="margin-top: 15px; color: #64748b; font-weight: 700; font-size: 18px;">جاري تحويلك إلى النظام...</div>
    <div class="progress-container">
      <div class="progress-fill"></div>
    </div>
  </div>
  <div class="mesh-bg"></div>
  <div class="login-container">
    <div class="logo-placeholder">
      <i class="fas fa-wand-magic-sparkles"
        style="font-size: 50px; color: var(--primary-color); filter: drop-shadow(0 10px 15px rgba(13, 92, 99, 0.15));"></i>
    </div>
    <h1>مرحباً بك مجدداً</h1>
    <form id="login-form">
      <div class="form-group">
        <label for="username"><i class="fas fa-clinic-medical"></i> اسم المستخدم / معرف العيادة</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="username" name="username" placeholder="مثال: clinic_admin" required>
        </div>
      </div>
      <div class="form-group">
        <label for="password"><i class="fas fa-lock"></i> كلمة المرور</label>
        <div class="input-wrapper">
          <i class="fas fa-key"></i>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit">تسجيل الدخول</button>
    </form>
    <div class="toast-container" id="toast-container"></div>
    <p id="error-msg" class="error-message"></p>
    <p id="success-msg" class="success-message"></p>
    <p id="load">جاري تحميل Firebase...</p>
  </div>

  <script>
    // Toast Notification System
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type} show`;
      toast.textContent = message;

      container.appendChild(toast);

      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    document.addEventListener('DOMContentLoaded', function () {
      const loadEl = document.querySelector('#load');
      const loginForm = document.querySelector('#login-form');
      const errorMsg = document.querySelector('#error-msg');
      const successMsg = document.querySelector('#success-msg');

      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const usernameInput = document.querySelector('#username').value.trim().toLowerCase();
        // تحويل اسم المستخدم إلى صيغة بريد إلكتروني داخلياً ليعمل مع نظام Firebase Auth
        const email = usernameInput.includes('@') ? usernameInput : `${usernameInput}@gmail.com`;
        const password = document.querySelector('#password').value;
        const submitBtn = loginForm.querySelector('button');

        // تحسين تجربة المستخدم: تعطيل الزر أثناء التحميل
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> جاري التحقق...';
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        firebase.auth().signInWithEmailAndPassword(email, password)
          .then((userCredential) => {
            // إظهار شاشة الترحيب الكبيرة
            const overlay = document.getElementById('welcome-overlay');
            if (overlay) overlay.classList.add('active');

            setTimeout(() => {
              window.location.replace('dashboard.html');
            }, 5000);
          })
          .catch((error) => {
            submitBtn.disabled = false;
            submitBtn.textContent = 'تسجيل الدخول';
            errorMsg.style.display = 'block';

            // ترجمة رسائل الخطأ الشائعة للعربية
            let message = "حدث خطأ أثناء تسجيل الدخول. يرجى المحاولة مرة أخرى.";
            if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
              message = "اسم المستخدم أو كلمة المرور غير صحيحة.";
              showToast(message, 'error');
            } else if (error.code === 'auth/invalid-email') {
              message = "صيغة البريد الإلكتروني غير صحيحة.";
              showToast(message, 'warning');
            } else if (error.code === 'auth/too-many-requests') {
              message = "تم حظر المحاولات مؤقتاً بسبب كثرة الأخطاء. حاول لاحقاً.";
              showToast(message, 'warning');
            } else {
              showToast('خطأ غير معروف. يرجى المحاولة لاحقاً.', 'error');
            }

            errorMsg.textContent = message;
            console.error("Firebase Auth Error:", error.code, error.message);
          });
      });

      try {
        // التحقق من الاتصال بقاعدة البيانات
        const connectedRef = firebase.database().ref(".info/connected");
        connectedRef.on("value", (snap) => {
          if (snap.val() === true) {
            loadEl.textContent = "متصل بنجاح بقاعدة البيانات ✅";
            loadEl.style.color = "#27ae60";
            loadEl.style.fontWeight = "700";
            //showToast('اتصال قاعدة البيانات ناجح!', 'success');
          } else {
            loadEl.textContent = "جاري محاولة الاتصال...";
            loadEl.style.color = "#64748b";
          }
        });
      } catch (e) {
        console.error(e);
        loadEl.textContent = 'خطأ في تحميل Firebase: ' + e.message;
        showToast('خطأ في تحميل Firebase', 'error');
      }
    });
  </script>
</body>

</html>
